<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Squares, Squares</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    const themes = [
      "white-theme",
      "gray-theme",
      "lightgray-theme",
      "offwhite-theme",

    ];

    document.addEventListener("DOMContentLoaded", () => {
      document.body.classList.add(themes[Math.floor(Math.random() * themes.length)]);
    });
  </script>
</head>
<body>
  <div class="terminal-container">
    <div class="box">
      <h2>> Squares, Squares</h2>
      <p>
        Squares, Squares is an audiovisual research project exploring the visualization
        of multiple oscillating square waves. Sounds are generated using 555 timer ICs
        and displayed as patterns on an analog CRT monitor via a modified VGA cable.
      </p>
    </div>
    <div class="box">
      <iframe width="100%" height="315"
        src="https://www.youtube.com/embed/MqAhV1ZSyhI"
        title="Squares, Squares – by Esra"
        frameborder="0"
        allowfullscreen>
      </iframe>
    </div>
    <div class="box"><a href="instruments.html"><< Back to Installations</a></div>
  </div>
</body>
</html>

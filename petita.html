<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ooobjects</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    const themes = [
      "white-theme",
      "gray-theme",
      "lightgray-theme",
      "offwhite-theme",
    ];

    document.addEventListener("DOMContentLoaded", () => {
      document.body.classList.add(themes[Math.floor(Math.random() * themes.length)]);
    });
  </script>
</head>
<body>
  <div class="terminal-container">
    <div class="box">
      <h2>> Objet petit a</h2>
      <p>
        Objet petit a is a soft toy research exploring how abstract, non-representational plush forms can still evoke deep emotional attachment and unconscious desire, functioning as substitutes for the unattainable object of love and lack.
      </p>
    </div>

    <div class="box">
      <iframe src="softtoy.pdf" width="100%" height="600px" style="border:none;">
        This browser does not support PDFs. Please download the PDF to view it: 
        <a href="softtoy.pdf">Download PDF</a>.
      </iframe>
    </div>

    <div class="box">
      <a href="ux.html"><< Back to UX/UI Research</a>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clutter</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    const themes = [
      "white-theme",
      "gray-theme",
      "lightgray-theme",
      "offwhite-theme",
    ];

    document.addEventListener("DOMContentLoaded", () => {
      document.body.classList.add(themes[Math.floor(Math.random() * themes.length)]);
    });
  </script>
</head>
<body>
  <div class="terminal-container">
    <div class="box">
      <h2>> Clutter</h2>
      <p>
       Clutter an installation/performance
that takes place in an empty and unfinished housing of a gated community in
Zekeriyaköy, Istanbul.
      </p>
    </div>

    <div class="box">
      <!-- Embed the PDF directly within an iframe to allow scrolling -->
      <iframe src="Esra_enzo_2.pdf" width="100%" height="600px"></iframe>
    </div>

    <div class="box">
      <iframe width="100%" height="315"
        src="https://www.youtube.com/embed/JPuv0YYXJHI"
        title="Sahibinden Satilik – by Esra"
        frameborder="0"
        allowfullscreen>
      </iframe>
    </div>

    <div class="box"><a href="instruments.html"><< Back to Installations</a></div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Essays</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    const themes = [
      "white-theme",
      "gray-theme",
      "lightgray-theme",
      "offwhite-theme",
    ];

    document.addEventListener("DOMContentLoaded", () => {
      document.body.classList.add(themes[Math.floor(Math.random() * themes.length)]);
    });
  </script>
</head>
<body>
  <div class="terminal-container">

    <div class="box">
      <img src="vday1.png" alt="VDay 1" style="width:100%; height:auto;" />

      <img src="vday2.png" alt="VDay 2" style="width:100%; height:auto;" />
    </div>

    </div>
    
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ooobjects</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    const themes = [
      "white-theme",
      "gray-theme",
      "lightgray-theme",
      "offwhite-theme",
    ];

    document.addEventListener("DOMContentLoaded", () => {
      document.body.classList.add(themes[Math.floor(Math.random() * themes.length)]);
    });
  </script>
</head>
<body>
  <div class="terminal-container">
    <div class="box">
      <h2>> oooobjects</h2>
      <p>
        oooobjects is an electroacoustic instrument that works with ferro-magnetic materials.
      </p>
    </div>

    <div class="box">
      <iframe width="100%" height="315"
        src="https://www.youtube.com/embed/fJVnPTQ0_ss"
        title="oooobjects – by Esra"
        frameborder="0"
        allowfullscreen>
      </iframe>
    </div>

    <div class="box"><a href="instruments.html"><< Back to Installations</a></div>
  </div>
</body>
</html>
